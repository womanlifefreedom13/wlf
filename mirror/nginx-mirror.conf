# Local offline file mirror for XMPlus, AmneziaWG, SoftEther
# Served on port 8080 with directory listing enabled

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;

    server_name localhost;

    root /opt/local-mirror;
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    send_timeout 300s;
    keepalive_timeout 65s;

    location / {
        try_files $uri $uri/ =404;
    }

    location /xmplus/ {
        alias /opt/local-mirror/xmplus/;
        autoindex on;
    }

    location /amneziawg/ {
        alias /opt/local-mirror/amneziawg/;
        autoindex on;
    }

    location /softether/ {
        alias /opt/local-mirror/softether/;
        autoindex on;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    access_log /var/log/nginx/local-mirror.access.log;
    error_log  /var/log/nginx/local-mirror.error.log warn;
}
